name: Conversion Matrix

on:
  pull_request:

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  POWERIO_CONVERSION_MATRIX_REPORT: ${{ github.workspace }}/target/conversion-matrix-report.md
  POWERIO_CONVERSION_MATRIX_DETAILS: ${{ github.workspace }}/target/conversion-matrix-warning-details.md

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - name: Generate conversion matrix
      run: cargo test -p powerio-cli --test conversion_matrix_report -- --nocapture
    - name: Upload warning details
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: conversion-matrix-warning-details
        path: ${{ env.POWERIO_CONVERSION_MATRIX_DETAILS }}
        if-no-files-found: ignore
    - name: Comment on PR
      if: always()
      uses: actions/github-script@v8
      with:
        script: |
          const fs = require("fs");
          const marker = "<!-- powerio-conversion-matrix-report -->";
          const reportPath = process.env.POWERIO_CONVERSION_MATRIX_REPORT;
          const detailsPath = process.env.POWERIO_CONVERSION_MATRIX_DETAILS;
          let body;
          if (fs.existsSync(reportPath)) {
            body = fs.readFileSync(reportPath, "utf8");
          } else {
            body = `${marker}\n\n## Conversion Matrix\n\nMatrix generation failed before writing the report. See the workflow logs.`;
          }

          const issue_number = context.payload.pull_request.number;
          const { owner, repo } = context.repo;
          const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
          if (fs.existsSync(detailsPath)) {
            let detailsUrl = runUrl;
            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner,
              repo,
              run_id: context.runId,
              per_page: 100,
            });
            const detailsArtifact = artifacts.find((artifact) =>
              artifact.name === "conversion-matrix-warning-details"
            );
            if (detailsArtifact) {
              detailsUrl = `${runUrl}/artifacts/${detailsArtifact.id}`;
            }
            body += `\n\nFull warning details: [download \`conversion-matrix-warning-details\`](${detailsUrl}) for this workflow run.`;
          }
          const comments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number,
            per_page: 100,
          });
          const existing = comments.find((comment) =>
            comment.user?.type === "Bot" && comment.body?.includes(marker)
          );
          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
          }
