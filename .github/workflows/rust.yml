name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    # The tree is rustfmt-clean (style_edition 2024); keep it that way.
    - name: Check formatting
      run: cargo fmt --all --check

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - uses: Swatinem/rust-cache@v2
    - name: Build
      run: cargo build --verbose
    # Deny the workspace pedantic lints on the non-extension crates. The PyO3
    # ext crates are linted in the Python workflow with their feature enabled.
    - name: Clippy
      run: cargo clippy --all-targets -p powerio -p powerio-matrix -p powerio-cli -p powerio-capi -- -D warnings
    # Bare `cargo test` only covers powerio + powerio-matrix (the default-members); name
    # the C ABI crate explicitly so its end-to-end ABI tests run in CI too.
    - name: Run tests
      run: cargo test -p powerio -p powerio-matrix -p powerio-cli -p powerio-capi --verbose
    # The gridfm Parquet export is behind a cargo feature; exercise it (and its
    # clippy) explicitly so coverage doesn't depend on CLI feature unification.
    - name: Clippy + tests (gridfm feature)
      run: |
        cargo clippy -p powerio-matrix --all-targets --features gridfm -- -D warnings
        cargo test -p powerio-matrix --features gridfm --verbose

  c-abi:
    name: C ABI (header parity + C smoke test)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - name: Build powerio-capi (cdylib + staticlib)
      run: cargo build -p powerio-capi --release
    # Every `pio_` export in the Rust source must be declared in the checked-in
    # header, so a new, renamed, or removed entry point can't silently drift out
    # of sync with include/powerio.h.
    - name: Header symbol parity
      run: |
        grep -oE 'extern "C" fn pio_[a-z_]+' powerio-capi/src/lib.rs \
          | grep -oE 'pio_[a-z_]+' | sort -u > rs_syms
        grep -oE 'pio_[a-z_]+ *\(' powerio-capi/include/powerio.h \
          | grep -oE 'pio_[a-z_]+' | sort -u > h_syms
        diff rs_syms h_syms
    # Drive the ABI from C against the built library: proves the header is valid
    # C, the symbols link, and the exercised signatures match. Dynamic-linked so
    # the platform resolves the Rust runtime deps.
    - name: Compile and run the C smoke test
      run: |
        cc -I powerio-capi/include powerio-capi/examples/smoke.c \
           -L target/release -lpowerio_capi -o pio_smoke
        LD_LIBRARY_PATH=target/release ./pio_smoke tests/data/case9.m
