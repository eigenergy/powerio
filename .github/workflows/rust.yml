name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  encoding:
    name: Encoding (no BOM, no mojibake)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    # Windows editors have twice corrupted text files in PRs: CRLF in vendored
    # fixtures (#73, now pinned via .gitattributes) and UTF-8 re-encoded as
    # cp1252 plus a BOM (#77). .gitattributes can't catch the latter two, so
    # reject them here. tests/data is exempt: vendored fixtures keep their
    # committed bytes.
    - name: No UTF-8 BOM
      run: |
        if git grep -Iln $'\xef\xbb\xbf' -- .; then
          echo "UTF-8 BOM found in the files above"; exit 1
        fi
    - name: No cp1252 mojibake
      run: |
        if git grep -Iln $'\xc3\xa2' -- ':!tests/data'; then
          echo "mojibake (UTF-8 read as cp1252 and re-encoded) found in the files above"; exit 1
        fi
    # A path component whose stem is a reserved DOS device name (aux, con, nul,
    # prn, com1-9, lpt1-9), ends in a dot or space, or contains <>:"\|?* cannot
    # be checked out on Windows. Only the release workflow runs a Windows job,
    # so without this gate the breakage surfaces at tag time (v0.2.0 failed on
    # powerworld/aux.rs).
    - name: Windows-checkoutable paths
      run: |
        git ls-files | awk -F/ '{
          if ($0 ~ /[<>:"\\|?*]/) { print; bad=1; next }
          for (i = 1; i <= NF; i++) {
            c = tolower($i); sub(/\..*$/, "", c)
            if (c ~ /^(con|prn|aux|nul|com[1-9]|lpt[1-9])$/ || $i ~ /[. ]$/) { print; bad=1; break }
          }
        } END { exit bad }' || {
          echo "the paths above cannot be checked out on Windows"; exit 1
        }

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    # The tree is rustfmt-clean (style_edition 2024); keep it that way.
    - name: Check formatting
      run: cargo fmt --all --check

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - uses: Swatinem/rust-cache@v2
    - name: Build
      run: cargo build --verbose
    # Deny the workspace pedantic lints on the non-extension crates. The PyO3
    # ext crates are linted in the Python workflow with their feature enabled.
    - name: Clippy
      run: cargo clippy --all-targets -p powerio -p powerio-matrix -p powerio-cli -p powerio-capi -p powerio-dist -p powerio-pkg -- -D warnings
    # Bare `cargo test` only covers the default-members; name the C ABI crate
    # explicitly so its end-to-end ABI tests run in CI too.
    - name: Run tests
      run: cargo test -p powerio -p powerio-matrix -p powerio-cli -p powerio-capi -p powerio-dist -p powerio-pkg --verbose
    # The gridfm Parquet export is behind a cargo feature; exercise it (and its
    # clippy) explicitly so coverage doesn't depend on CLI feature unification.
    - name: Clippy + tests (gridfm feature)
      run: |
        cargo clippy -p powerio-matrix --all-targets --features gridfm -- -D warnings
        cargo test -p powerio-matrix --features gridfm --verbose

  wasm32:
    name: wasm32 check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
    - uses: Swatinem/rust-cache@v2
    - name: Check wasm32 parser crates
      run: cargo check --target wasm32-unknown-unknown -p powerio -p powerio-dist -p powerio-pkg

  c-abi:
    name: C ABI (core no-default + C smoke test)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - uses: Swatinem/rust-cache@v2
    - name: Build powerio-capi --no-default-features
      run: cargo build -p powerio-capi --release --no-default-features
    # Every `pio_` export in the Rust source must be declared in the checked-in
    # header, so a new, renamed, or removed entry point can't silently drift out
    # of sync with include/powerio.h.
    - name: Header symbol parity
      run: bash scripts/capi-header-parity.sh
    # Drive the ABI from C against the built library: proves the header is valid
    # C, the symbols link, and the exercised signatures match. Dynamic-linked so
    # the platform resolves the Rust runtime deps.
    - name: Compile and run the C smoke test
      run: |
        cc -I powerio-capi/include powerio-capi/examples/smoke.c \
           -L target/release -lpowerio_capi -o pio_smoke
        LD_LIBRARY_PATH=target/release ./pio_smoke tests/data/case9.m
    - name: Compile and run the C++ header sanity check
      run: |
        c++ -std=c++17 -I powerio-capi/include powerio-capi/examples/header_cpp.cpp \
           -L target/release -lpowerio_capi -o pio_header_cpp
        LD_LIBRARY_PATH=target/release ./pio_header_cpp
    - name: Tests + clippy (core no-default)
      run: |
        cargo test -p powerio-capi --no-default-features --verbose
        cargo clippy -p powerio-capi --all-targets --no-default-features -- -D warnings

  c-abi-arrow:
    name: C ABI (arrow feature)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - uses: Swatinem/rust-cache@v2
    - name: Build powerio-capi --features arrow
      run: cargo build -p powerio-capi --release --features arrow
    # The cfg-gated pio_to_arrow still appears in the source symbol grep, so
    # it must be declared in the header (inside #ifdef PIO_ARROW); parity holds.
    - name: Header symbol parity
      run: bash scripts/capi-header-parity.sh
    # Compile the smoke test with -DPIO_ARROW so it exercises the Arrow C Data
    # Interface export against the arrow-featured library.
    - name: Compile and run the C smoke test (arrow)
      run: |
        cc -DPIO_ARROW -I powerio-capi/include powerio-capi/examples/smoke.c \
           -L target/release -lpowerio_capi -o pio_smoke_arrow
        LD_LIBRARY_PATH=target/release ./pio_smoke_arrow tests/data/case9.m
    - name: Tests + clippy (arrow feature)
      run: |
        cargo test -p powerio-capi --features arrow --verbose
        cargo clippy -p powerio-capi --all-targets --features arrow -- -D warnings

  c-abi-gridfm:
    name: C ABI (release features)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - uses: Swatinem/rust-cache@v2
    - name: Build powerio-capi --features arrow,gridfm,dist,pkg
      run: cargo build -p powerio-capi --release --features arrow,gridfm,dist,pkg
    # The cfg-gated optional symbols still appear in the source symbol grep,
    # so they must be declared in the header (inside their PIO_* guards);
    # parity holds for the release feature set.
    - name: Header symbol parity
      run: bash scripts/capi-header-parity.sh
    # Compile the smoke test with every optional PIO_* define so it exercises
    # the same C surface the release artifacts export.
    - name: Compile and run the C smoke test (release features)
      run: |
        rm -rf /tmp/pio-gridfm-smoke
        cargo run -p powerio-cli -- gridfm tests/data/case9.m -o /tmp/pio-gridfm-smoke
        cc -DPIO_ARROW -DPIO_GRIDFM -DPIO_DIST -DPIO_PKG \
           -I powerio-capi/include powerio-capi/examples/smoke.c \
           -L target/release -lpowerio_capi -o pio_smoke_gridfm
        LD_LIBRARY_PATH=target/release ./pio_smoke_gridfm tests/data/case9.m /tmp/pio-gridfm-smoke/case9/raw
    - name: Compile and run the C++ header sanity check (release features)
      run: |
        c++ -std=c++17 -DPIO_ARROW -DPIO_GRIDFM -DPIO_DIST -DPIO_PKG \
           -I powerio-capi/include powerio-capi/examples/header_cpp.cpp \
           -L target/release -lpowerio_capi -o pio_header_cpp_release
        LD_LIBRARY_PATH=target/release ./pio_header_cpp_release
    - name: Tests + clippy (release features)
      run: |
        cargo test -p powerio-capi --features arrow,gridfm,dist,pkg --verbose
        cargo clippy -p powerio-capi --all-targets --features arrow,gridfm,dist,pkg -- -D warnings

  c-abi-dist:
    name: C ABI (dist feature)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - uses: Swatinem/rust-cache@v2
    - name: Build powerio-capi --features dist
      run: cargo build -p powerio-capi --release --features dist
    # The cfg-gated pio_dist_* entry points still appear in the source symbol
    # grep, so they must be declared in the header (inside #ifdef PIO_DIST);
    # parity holds.
    - name: Header symbol parity
      run: bash scripts/capi-header-parity.sh
    # Compile the smoke test with -DPIO_DIST so it exercises the distribution
    # entry points against the dist-featured library.
    - name: Compile and run the C smoke test (dist)
      run: |
        cc -DPIO_DIST -I powerio-capi/include powerio-capi/examples/smoke.c \
           -L target/release -lpowerio_capi -o pio_smoke_dist
        LD_LIBRARY_PATH=target/release ./pio_smoke_dist tests/data/case9.m
    - name: Tests + clippy (dist feature)
      run: |
        cargo test -p powerio-capi --features dist --verbose
        cargo clippy -p powerio-capi --all-targets --features dist -- -D warnings
