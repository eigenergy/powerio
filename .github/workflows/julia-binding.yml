name: Julia binding

# Contract test: build this commit's C ABI and run PowerIO.jl's suite against it.
# A change to the pio_* surface or the Network JSON schema then fails in the repo
# that caused it. Add a token with read access to eigenergy/PowerIO.jl as the
# POWERIO_JL_REPO_TOKEN secret to enable the checkout. Without the token this job
# prints a skip notice and passes, so missing external access never blocks a PR.
on:
  push:
    branches: [ "main" ]
    paths: [ "powerio/**", "powerio-capi/**", ".github/workflows/julia-binding.yml" ]
  pull_request:
    branches: [ "main" ]
    paths: [ "powerio/**", "powerio-capi/**", ".github/workflows/julia-binding.yml" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  contract:
    name: PowerIO.jl against this C ABI
    runs-on: ubuntu-latest
    env:
      # secrets can't be read in `if:` directly; surface it as an env var to gate on.
      POWERIO_JL_TOKEN: ${{ secrets.POWERIO_JL_REPO_TOKEN }}
    steps:
    - name: Skip notice (no PowerIO.jl token)
      if: env.POWERIO_JL_TOKEN == ''
      run: echo "POWERIO_JL_REPO_TOKEN is not set; skipping the PowerIO.jl contract test. Add a token with read access to eigenergy/PowerIO.jl as the POWERIO_JL_REPO_TOKEN secret to enable it."
    - uses: actions/checkout@v4
      if: env.POWERIO_JL_TOKEN != ''
    - uses: dtolnay/rust-toolchain@stable
      if: env.POWERIO_JL_TOKEN != ''
    - uses: Swatinem/rust-cache@v2
      if: env.POWERIO_JL_TOKEN != ''
    - name: Build powerio-capi
      if: env.POWERIO_JL_TOKEN != ''
      # --features arrow so PowerIO.jl's Arrow export tests run against a real
      # pio_export_arrow symbol rather than skipping.
      run: cargo build -p powerio-capi --release --features arrow
    - name: Check out PowerIO.jl
      if: env.POWERIO_JL_TOKEN != ''
      uses: actions/checkout@v4
      with:
        repository: eigenergy/PowerIO.jl
        path: PowerIO.jl
        token: ${{ secrets.POWERIO_JL_REPO_TOKEN }}
    - uses: julia-actions/setup-julia@v2
      if: env.POWERIO_JL_TOKEN != ''
      with:
        version: '1'
    - uses: julia-actions/cache@v2
      if: env.POWERIO_JL_TOKEN != ''
    # PowerIO.jl's ccall tests skip themselves when the cdylib is absent.
    # POWERIO_CAPI points them at the library just built.
    - name: Test PowerIO.jl against the built library
      if: env.POWERIO_JL_TOKEN != ''
      env:
        POWERIO_CAPI: ${{ github.workspace }}/target/release/libpowerio_capi.so
      run: julia --project=PowerIO.jl -e 'using Pkg; Pkg.instantiate(); Pkg.test()'
