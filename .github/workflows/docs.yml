name: Docs

# Build the workspace rustdoc and publish it to GitHub Pages. This renders all
# six library crates, including powerio-capi and powerio-py (publish = false),
# whose //! docs docs.rs would never host. docs.rs takes over for the published
# crates (powerio, powerio-matrix, powerio-dist, powerio-pkg) once they reach
# crates.io.
# PRs build the docs too (so a broken intra-doc link fails review, not main),
# but only push to main / dispatch deploys to Pages; see the `deploy` gate.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize per ref: main's Pages deploys supersede each other, and a PR's doc
# build can't cancel main's in-flight deploy.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - name: Install mdBook
      run: cargo install mdbook --version 0.5.2 --locked
    # -D warnings turns a broken intra-doc link into a failed build, so the docs
    # can't rot silently. --all-features renders the gridfm/arrow/kkt surface.
    - name: Build docs
      env:
        RUSTDOCFLAGS: "-D warnings"
      run: cargo doc --no-deps --all-features -p powerio -p powerio-matrix -p powerio-dist -p powerio-pkg -p powerio-capi -p powerio-py
    - name: Build Python API docs
      run: |
        python -m pip install --upgrade pip
        python -m pip install '.[all]' pdoc
        python -m pdoc powerio -o target/doc/python
    - name: Build book
      run: mdbook build docs --dest-dir target/doc/guide
    # The landing page separates the doc deployments so neither shadows the
    # other: docs.rs renders crates.io releases, while this site renders main
    # rustdoc, the Python API reference, and the mdBook guide.
    - name: Landing page
      run: |
        mkdir -p target/doc/_assets
        cp docs/src/assets/powerio-logo.svg target/doc/_assets/
        cat > target/doc/index.html <<'HTML'
        <!doctype html>
        <html lang="en">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>PowerIO docs</title>
        <link rel="icon" href="_assets/powerio-logo.svg">
        <style>
          :root {
            --bg:#faf8f4; --fg:#26221b; --muted:#76705f;
            --rust:#b7410e; --line:#e4ded2;
          }
          @media (prefers-color-scheme: dark) {
            :root {
              --bg:#15120e; --fg:#e9e3d5; --muted:#9d958a;
              --rust:#e0773f; --line:#2d2820;
            }
          }
          html { border-top: 3px solid var(--rust); }
          body {
            font-family: "Charter", "Georgia", serif; font-size: 1.0625rem;
            color: var(--fg); background: var(--bg);
            max-width: 600px; margin: 5rem auto 4rem; padding: 0 1.5rem; line-height: 1.6;
          }
          header { display: flex; align-items: center; gap: .9rem; margin-bottom: .4rem; }
          header img { width: 52px; height: 52px; }
          h1 { margin: 0; font-size: 1.7rem; font-weight: 600; letter-spacing: -.01em; }
          .tagline { color: var(--muted); font-style: italic; margin: 0 0 2.6rem; }
          dl { margin: 0; }
          dl > div {
            display: grid; grid-template-columns: 10.5rem 1fr; gap: 0 1.5rem;
            padding: .9rem 0; border-top: 1px solid var(--line);
          }
          dt {
            font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
            font-size: .78rem; color: var(--muted); padding-top: .3rem;
          }
          dd { margin: 0; display: flex; flex-wrap: wrap; column-gap: 1.5rem; row-gap: .25rem; }
          a { color: var(--rust); text-decoration: none; }
          a:hover { text-decoration: underline; text-underline-offset: 3px; }
          footer {
            font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
            font-size: .78rem; border-top: 1px solid var(--line); padding-top: .9rem;
          }
          footer a { color: var(--muted); }
          @media (max-width: 560px) {
            dl > div { grid-template-columns: 1fr; }
            dt { padding-top: 0; }
          }
        </style>
        <header>
          <img src="_assets/powerio-logo.svg" alt="PowerIO logo">
          <h1>PowerIO docs</h1>
        </header>
        <p class="tagline">Case parsing, conversion, matrices, and language bindings.</p>
        <dl>
          <div>
            <dt>released / docs.rs</dt>
            <dd><a href="https://docs.rs/powerio">powerio</a>
                <a href="https://docs.rs/powerio-matrix">powerio-matrix</a>
                <a href="https://docs.rs/powerio-dist">powerio-dist</a>
                <a href="https://docs.rs/powerio-pkg">powerio-pkg</a></dd>
          </div>
          <div>
            <dt>development / main</dt>
            <dd><a href="powerio/index.html">powerio</a>
                <a href="powerio_matrix/index.html">powerio-matrix</a>
                <a href="powerio_dist/index.html">powerio-dist</a>
                <a href="powerio_pkg/index.html">powerio-pkg</a>
                <a href="powerio_capi/index.html">powerio-capi</a>
                <a href="python/powerio.html">python</a></dd>
          </div>
          <div>
            <dt>guide</dt>
            <dd><a href="guide/index.html">overview</a>
                <a href="guide/format-fidelity.html">format fidelity</a>
                <a href="guide/matrices.html">matrices</a>
                <a href="guide/dcopf-bundle.html">DC OPF bundle</a>
                <a href="guide/languages.html">language APIs</a>
                <a href="guide/python.html">python</a></dd>
          </div>
          <div>
            <dt>bindings</dt>
            <dd><a href="https://eigenergy.github.io/PowerIO.jl/dev/">PowerIO.jl</a></dd>
          </div>
        </dl>
        <footer><a href="https://github.com/eigenergy/powerio">github.com/eigenergy/powerio</a></footer>
        HTML
    - uses: actions/upload-pages-artifact@v5
      with:
        path: target/doc

  deploy:
    needs: build
    # PR runs build to catch doc breakage but never publish; only main / dispatch deploy.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - id: deployment
      uses: actions/deploy-pages@v5
