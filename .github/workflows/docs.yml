name: Docs

# Build the workspace rustdoc and publish it to GitHub Pages. This renders all
# four library crates, including powerio-capi and powerio-py (publish = false),
# whose //! docs docs.rs would never host. docs.rs takes over for powerio and
# powerio-matrix once those are published to crates.io.
# PRs build the docs too (so a broken intra-doc link fails review, not main),
# but only push to main / dispatch deploys to Pages; see the `deploy` gate.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize per ref: main's Pages deploys supersede each other, and a PR's doc
# build can't cancel main's in-flight deploy.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    # -D warnings turns a broken intra-doc link into a failed build, so the docs
    # can't rot silently. --all-features renders the gridfm/arrow/kkt surface.
    - name: Build docs
      env:
        RUSTDOCFLAGS: "-D warnings"
      run: cargo doc --no-deps --all-features -p powerio -p powerio-matrix -p powerio-capi -p powerio-py
    - name: Build Python API docs
      run: |
        python -m pip install --upgrade pip
        python -m pip install '.[all]' pdoc
        python -m pdoc powerio -o target/doc/python
    - name: Landing page
      run: |
        cat > target/doc/index.html <<'HTML'
        <!doctype html>
        <meta charset="utf-8">
        <title>PowerIO docs</title>
        <style>
          body { font-family: system-ui, sans-serif; max-width: 720px; margin: 4rem auto; padding: 0 1rem; line-height: 1.5; }
          a { color: #0b5cad; }
        </style>
        <h1>PowerIO docs</h1>
        <ul>
        <li><a href="powerio/index.html">powerio (Rust crate docs)</a></li>
        <li><a href="powerio_matrix/index.html">powerio-matrix (Rust crate docs)</a></li>
        <li><a href="powerio_capi/index.html">powerio-capi (C ABI crate docs)</a></li>
        <li><a href="python/powerio.html">powerio (Python API docs)</a></li>
        <li><a href="https://eigenergy.github.io/PowerIO.jl/dev/">PowerIO.jl (Julia API docs)</a></li>
        </ul>
        HTML
    - uses: actions/upload-pages-artifact@v3
      with:
        path: target/doc

  deploy:
    needs: build
    # PR runs build to catch doc breakage but never publish; only main / dispatch deploy.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - id: deployment
      uses: actions/deploy-pages@v4
