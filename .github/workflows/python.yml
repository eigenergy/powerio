name: Python

on:
  push:
    branches: [ "main" ]
  # No branch filter: stacked PRs must run this too (see rust.yml).
  pull_request:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # `cargo clippy` at the root skips powerio-py (it's not in default-members),
      # so lint the extension explicitly with the same native features as wheels.
      - name: Clippy (powerio-py)
        run: bash scripts/ci-clippy.sh powerio-py

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: [ "3.9", "3.12" ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # This job is the gridfm-absent build: compile the extension without the
      # gridfm cargo feature so `test_gridfm_absent_raises_clean_importerror` and
      # the `_require_gridfm()` ImportError fallback actually run (every other
      # job builds the full released wheel, where they skip).
      - name: Compile the gridfm feature out
        run: sed -i 's/features = \["extension-module", "gridfm"\]/features = ["extension-module"]/' pyproject.toml
      # `pip install .[all,mcp]` builds the extension via the maturin backend and
      # pulls scipy/numpy/networkx and Polars (matrix + graph tests) plus the MCP
      # SDK. The `mcp` extra carries a `python_version >= '3.10'` marker, so it
      # installs the SDK on 3.12 (test_mcp runs) and resolves to nothing on 3.9
      # (test_mcp skips). Quote the extras so the shell doesn't glob `[all,mcp]`.
      - name: Install powerio + test deps
        run: pip install '.[all,mcp]' pytest
      - name: Run tests
        run: pytest python/tests -q
      # The core import path: parse/convert/write import nothing but the
      # interpreter. Without the gridfm feature the wrapper must fail with a
      # clear ImportError, not an AttributeError from the missing native symbol.
      - name: Zero-dep parse path
        run: |
          python -m venv /tmp/zerodep
          /tmp/zerodep/bin/pip install .
          /tmp/zerodep/bin/python - <<'PY'
          import tempfile
          import sys, powerio
          c = powerio.parse_file("tests/data/case14.m")
          assert c.to_matpower() == open("tests/data/case14.m").read()
          assert "numpy" not in sys.modules and "scipy" not in sys.modules
          assert not powerio._powerio._has_gridfm
          try:
              c.write_gridfm(tempfile.mkdtemp(prefix="powerio-gridfm-"))
          except ImportError as e:
              assert "gridfm" in str(e)
          else:
              raise SystemExit("expected ImportError without the gridfm feature")
          PY

  # Build the same wheel users get, install the GridFM and pandas compatibility
  # extras, and run the Parquet read/write tests before merge and on main.
  test-gridfm:
    name: test (gridfm extra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install maturin
        run: pip install maturin
      # Install a wheel (not `develop`): a regular site-packages install wins the
      # `import powerio` race against the repo's `powerio/` crate directory, where
      # an editable install would not.
      - name: Build the wheel
        run: maturin build --release --out dist
      - name: Install wheel + test deps
        run: |
          wheel=$(ls dist/*.whl)
          pip install "${wheel}[all,gridfm,pandas]" pytest
      # `_has_gridfm` is now true, so the @gridfm_only tests run instead of skipping.
      - name: Run gridfm tests
        run: pytest python/tests -q -k gridfm

  wheels:
    name: wheels (${{ matrix.platform.target }} on ${{ matrix.platform.runner }})
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest,  target: x86_64 }
          - { runner: ubuntu-latest,  target: aarch64 }
          # macos-13 (the last x86_64 image) is retired; maturin-action
          # cross-compiles the x86_64 wheel on the arm64 runner.
          - { runner: macos-14,       target: x86_64 }
          - { runner: macos-14,       target: aarch64 }
          - { runner: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      # abi3-py39 → one wheel per platform covers Python 3.9+.
      - name: Build powerio wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist

  sdist:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build powerio sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist

  publish:
    name: publish to PyPI
    # release-binaries.yml stages each release as a draft a human publishes, so
    # the release event fires with a user actor (events from a workflow's
    # GITHUB_TOKEN are swallowed by the recursion guard). Manual dispatch is the
    # recovery path for a missed event.
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: [ lint, test, test-gridfm, wheels, sdist ]
    runs-on: ubuntu-latest
    # Deployment protection (required reviewers, tag rules) lives on the pypi
    # environment in the repo settings, not in this file.
    environment: pypi
    permissions:
      id-token: write  # PyPI trusted publishing; no stored token
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Check distributions
        run: |
          python -m pip install twine
          python -m twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # A partially failed upload (e.g. wheels in, sdist rejected) is
          # recovered by re-running; already-uploaded files are skipped.
          skip-existing: true
