name: Python

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # `cargo clippy` at the root skips casemat-ext (it's not in
      # default-members), so lint the extension explicitly. --no-deps keeps the
      # gate on this crate only.
      - name: Clippy (casemat-ext)
        run: cargo clippy -p casemat-ext --no-deps --features extension-module -- -D warnings
      - name: Clippy (caseio-ext)
        run: cargo clippy -p caseio-ext --no-deps --features extension-module -- -D warnings

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: [ "3.9", "3.12" ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `pip install .` builds the extension via the maturin backend.
      # Quote the extras so the shell doesn't glob `[networkx]`.
      - name: Install casemat + test deps
        run: pip install '.[networkx]' pytest
      # The caseio wheel (no numpy/scipy) builds from its own pyproject.
      - name: Install caseio
        run: pip install ./caseio-ext
      - name: Run tests
        run: pytest python/tests -q

  wheels:
    name: wheels (${{ matrix.platform.target }} on ${{ matrix.platform.runner }})
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest,  target: x86_64 }
          - { runner: ubuntu-latest,  target: aarch64 }
          - { runner: macos-13,       target: x86_64 }
          - { runner: macos-14,       target: aarch64 }
          - { runner: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      # abi3-py39 → one wheel per platform covers Python 3.9+.
      - name: Build casemat wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
      - name: Build caseio wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -m caseio-ext/pyproject.toml
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist

  sdist:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build casemat sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Build caseio sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m caseio-ext/pyproject.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish:
    name: publish to PyPI
    if: github.event_name == 'release'
    needs: [ test, wheels, sdist ]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # PyPI trusted publishing; no stored token
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
