[package]
name = "gridforge"
version = "0.1.0"
edition = "2021"
rust-version = "1.86"
description = "Parses power network case files and emits sparse matrices (B', B'', Y_bus, LACPF) and graph views for solver and ML pipelines."
license = "MIT OR Apache-2.0"
repository = "https://github.com/samtalki/gridforge"
readme = "README.md"
keywords = ["power", "matpower", "graph", "sparse", "fdpf"]
categories = ["science", "parsing", "command-line-utilities"]

[lib]
name = "gridforge"
path = "src/lib.rs"

[[bin]]
name = "gridforge"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
regex = "1"
thiserror = "2"
anyhow = "1"
sprs = { version = "0.11", default-features = false }
num-complex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rand = "0.9"
rand_chacha = "0.9"
walkdir = "2"
rayon = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
ratatui = { version = "0.30", features = ["crossterm_0_29"] }
crossterm = "0.29"
sha2 = "0.10"
petgraph = "0.8"

[dev-dependencies]
approx = "0.5"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
cast_precision_loss = "allow"
cast_possible_truncation = "allow"
cast_sign_loss = "allow"
similar_names = "allow"
